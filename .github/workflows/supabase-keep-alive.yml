name: Supabase Keep Alive

on:
  schedule:
    # Runs every 3 days at 09:00 UTC — well before the 7-day pause threshold
    - cron: '0 9 */3 * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/user_preferences?select=user_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Unexpected status $STATUS — check secrets and URL"
            exit 1
          fi
          echo "Supabase is awake."
